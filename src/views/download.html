<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ดาวน์โหลดไฟล์</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #06c755; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px; width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 18px; color: #222; margin-bottom: 8px; }
    .filename { font-size: 13px; color: #888; margin-bottom: 24px; word-break: break-all; }
    .form-group { margin-bottom: 16px; text-align: left; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #06c755; }
    button {
      width: 100%; padding: 12px; background: #06c755; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    button:hover { background: #05b04a; }
    .error {
      background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
    }
    .preview img { max-width: 100%; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="card" id="app">กำลังโหลด...</div>
<script>
const msgId = location.pathname.split('/dl/')[1];
let fileInfo = null;

async function init() {
  const res = await fetch(`/dl-info/${msgId}`);
  fileInfo = await res.json();
  if (fileInfo.error) { render('<p style="color:#c00">ไม่พบไฟล์</p>'); return; }
  if (fileInfo.needPassword) renderPasswordForm();
  else renderDownload();
}

function renderPasswordForm(error) {
  document.getElementById('app').innerHTML = `
    <div class="icon">${fileInfo.type === 'image' ? '🖼️' : '📄'}</div>
    <h1>ไฟล์ถูกป้องกันด้วยรหัสผ่าน</h1>
    <p class="filename">${fileInfo.fileName || 'ไฟล์'}</p>
    ${error ? '<div class="error">รหัสผ่านไม่ถูกต้อง</div>' : ''}
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="pw" placeholder="••••••••" autofocus
             onkeydown="if(event.key==='Enter')submit()">
    </div>
    <button onclick="submit()">ยืนยัน</button>
  `;
}

async function submit() {
  const pw = document.getElementById('pw').value;
  const res = await fetch(`/dl/${msgId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  const data = await res.json();
  if (data.ok) renderDownload(data.url);
  else renderPasswordForm(true);
}

function renderDownload(url) {
  const fileUrl = url || `/dl-file/${msgId}`;
  const isImage = fileInfo.type === 'image';
  document.getElementById('app').innerHTML = `
    <div class="icon">✅</div>
    <h1>บันทึกสำเร็จ</h1>
    <p class="filename">${fileInfo.fileName || 'ไฟล์'}</p>
    ${isImage ? `<div class="preview"><img src="${fileUrl}" onerror="this.style.display='none'"></div>` : ''}
    <a href="${fileUrl}" download>
      <button>⬇️ ดาวน์โหลด</button>
    </a>
  `;
}

init();
</script>
</body>
</html>
