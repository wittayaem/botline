<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LINE Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #222; }

    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 260px;
      background: #fff; border-right: 1px solid #e8eaed;
      display: flex; flex-direction: column;
    }
    .main { margin-left: 260px; min-height: 100vh; }

    .sidebar-header {
      padding: 20px; border-bottom: 1px solid #e8eaed;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .sidebar-header .logo { width: 32px; height: 32px; fill: #06c755; }
    .sidebar-header h2 { font-size: 16px; color: #222; }

    .group-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    .group-section-label {
      padding: 8px 16px 4px; font-size: 11px; font-weight: 700;
      color: #aaa; letter-spacing: 0.5px; text-transform: uppercase;
      display: flex; align-items: center;
    }

    .group-item {
      padding: 10px 16px; cursor: pointer; transition: background 0.15s;
      display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent;
    }
    .group-item:hover { background: #f0f7ff; }
    .group-item.active { background: #e8f5e9; border-left-color: #06c755; }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.approved  { background: #06c755; }
    .dot.pending   { background: #f59e0b; }
    .dot.rejected  { background: #e53e3e; }
    .dot.disabled  { background: #ccc; }

    .group-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .group-id { font-size: 11px; color: #999; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sidebar-footer { padding: 12px 16px; border-top: 1px solid #e8eaed; flex-shrink: 0; }
    .user-info-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #f5f7fa; border-radius: 8px; margin-bottom: 8px;
    }
    .user-info-bar .avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #06c755;
      color: white; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .user-info-bar .name { font-size: 13px; font-weight: 600; color: #333; }
    .user-info-bar .role-tag { font-size: 11px; color: #888; }
    .admin-actions { display: none; gap: 6px; margin-bottom: 8px; }
    .admin-actions.show { display: flex; }
    .admin-btn {
      flex: 1; padding: 7px 4px; text-align: center; border-radius: 8px;
      font-size: 12px; font-weight: 600; text-decoration: none; cursor: pointer;
      border: none; transition: background 0.2s;
    }
    .admin-btn.green { background: #e8f5e9; color: #2e7d32; }
    .admin-btn.green:hover { background: #c8e6c9; }
    .admin-btn.blue { background: #e3f2fd; color: #1565c0; }
    .admin-btn.blue:hover { background: #bbdefb; }
    .admin-btn.orange { background: #fff8e1; color: #e65100; }
    .admin-btn.orange:hover { background: #ffecb3; }

    .filter-bar {
      padding: 12px 20px; background: white; border-bottom: 1px solid #e8eaed;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .filter-input {
      flex: 1; min-width: 150px; border: 1.5px solid #e8eaed; border-radius: 8px;
      padding: 7px 12px; font-size: 13px; outline: none;
    }
    .filter-input:focus { border-color: #06c755; }
    .filter-date {
      border: 1.5px solid #e8eaed; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; outline: none; color: #444;
    }
    .filter-date:focus { border-color: #06c755; }
    .filter-btn {
      padding: 7px 16px; background: #06c755; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .filter-btn:hover { background: #05b04a; }
    .filter-clear {
      padding: 7px 12px; background: #f5f5f5; color: #666; border: none;
      border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .filter-clear:hover { background: #eee; }
    .logout-btn {
      display: block; width: 100%; padding: 8px; text-align: center;
      background: #f5f5f5; border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px; color: #666; text-decoration: none;
    }
    .logout-btn:hover { background: #eee; }

    .topbar {
      background: #fff; border-bottom: 1px solid #e8eaed;
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10; height: 56px;
    }
    .topbar h1 { font-size: 18px; }
    .status-badge {
      font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 600;
    }
    .status-badge.approved { background: #e8f5e9; color: #2e7d32; }
    .status-badge.pending  { background: #fef3c7; color: #92400e; }
    .status-badge.rejected { background: #fee2e2; color: #991b1b; }

    /* Tabs */
    .tabs-bar {
      background: #fff; border-bottom: 1px solid #e8eaed;
      display: flex; padding: 0 24px; gap: 0;
      position: sticky; top: 56px; z-index: 9;
    }
    .tab-btn {
      padding: 12px 20px; font-size: 14px; font-weight: 500; color: #888;
      border: none; background: none; cursor: pointer;
      border-bottom: 2.5px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #222; }
    .tab-btn.active { color: #06c755; border-bottom-color: #06c755; font-weight: 600; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .content { padding: 24px; }

    /* Pending banner */
    .pending-banner {
      background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 12px;
      padding: 20px 24px; margin-bottom: 20px;
    }
    .pending-banner h3 { font-size: 15px; color: #92400e; margin-bottom: 6px; }
    .pending-banner p { font-size: 13px; color: #78350f; margin-bottom: 16px; }
    .pending-actions { display: flex; gap: 10px; }
    .btn-approve {
      padding: 8px 20px; background: #06c755; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .btn-approve:hover { background: #05b04a; }
    .btn-reject {
      padding: 8px 20px; background: #fff; color: #e53e3e;
      border: 1.5px solid #e53e3e; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600;
    }
    .btn-reject:hover { background: #fee2e2; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #e8eaed; }
    .card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .card .value { font-size: 24px; font-weight: 700; color: #222; }

    /* Settings */
    .section { background: #fff; border-radius: 12px; border: 1px solid #e8eaed; margin-bottom: 16px; }
    .section-header {
      padding: 14px 20px; border-bottom: 1px solid #e8eaed;
      font-size: 14px; font-weight: 600; color: #444;
      display: flex; align-items: center; justify-content: space-between;
    }
    .settings-row {
      padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f5f5f5;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { font-size: 14px; }
    .settings-desc { font-size: 12px; color: #888; margin-top: 2px; }

    /* Toggle */
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 24px; transition: 0.2s;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #06c755; }
    input:checked + .slider:before { transform: translateX(20px); }

    .name-input {
      border: 1.5px solid #e8eaed; border-radius: 8px; padding: 6px 10px;
      font-size: 14px; outline: none; width: 200px;
    }
    .name-input:focus { border-color: #06c755; }
    .save-btn {
      padding: 6px 14px; background: #06c755; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .save-btn:hover { background: #05b04a; }

    /* Messages */
    .msg-list { max-height: calc(100vh - 260px); overflow-y: auto; }
    .msg-item {
      padding: 10px 20px; border-bottom: 1px solid #f5f5f5;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .msg-item:last-child { border-bottom: none; }
    .msg-type {
      font-size: 11px; padding: 2px 8px; border-radius: 12px; flex-shrink: 0;
      font-weight: 600; margin-top: 2px;
    }
    .msg-type.text  { background: #e8f5e9; color: #2e7d32; }
    .msg-type.image { background: #e3f2fd; color: #1565c0; }
    .msg-type.file  { background: #fff8e1; color: #e65100; }
    .msg-text { font-size: 14px; word-break: break-all; }
    .msg-meta { font-size: 11px; color: #999; margin-top: 3px; }
    .msg-file-link { color: #1a73e8; text-decoration: none; font-size: 13px; }
    .msg-file-link:hover { text-decoration: underline; }

    .send-box { display: flex; gap: 8px; padding: 16px 20px; border-top: 1px solid #e8eaed; }
    .send-input {
      flex: 1; border: 1.5px solid #e8eaed; border-radius: 8px; padding: 8px 12px;
      font-size: 14px; outline: none;
    }
    .send-input:focus { border-color: #06c755; }
    .send-btn {
      padding: 8px 18px; background: #06c755; color: white; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    }

    .empty { text-align: center; padding: 80px 20px; color: #999; }
    .empty svg { width: 64px; height: 64px; fill: #ddd; margin-bottom: 16px; display: block; margin: 0 auto 16px; }

    /* File list */
    .file-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      background: white; border: 1px solid #e8eaed; border-radius: 10px; padding: 12px 16px;
      transition: box-shadow 0.15s;
    }
    .file-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .file-icon {
      width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0; background: #fff8e1;
    }
    .file-info { flex: 1; overflow: hidden; }
    .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: #999; margin-top: 2px; }
    .file-dl {
      padding: 6px 14px; background: #e8f5e9; color: #2e7d32; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; flex-shrink: 0;
      transition: background 0.2s;
    }
    .file-dl:hover { background: #c8e6c9; }

    /* Image gallery */
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 20px; }
    .img-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; background: #f0f0f0; position: relative; }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .img-thumb:hover img { transform: scale(1.05); }
    .img-thumb .img-date { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 3px 6px; }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 32px; cursor: pointer; line-height: 1; }
    .lightbox-caption { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 20px; max-width: 80vw; text-align: center; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #333; color: white; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }

    .pending-count {
      background: #f59e0b; color: white; font-size: 11px; font-weight: 700;
      border-radius: 10px; padding: 1px 7px; margin-left: auto;
    }

    /* refresh indicator */
    .refresh-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #06c755; margin-left: 6px; vertical-align: middle;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <svg class="logo" viewBox="0 0 24 24"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M12 0C5.373 0 0 4.974 0 11.111c0 3.498 1.744 6.614 4.471 8.652V24l4.086-2.242c1.09.301 2.246.464 3.443.464 6.629 0 12-4.975 12-11.111C24 4.974 18.629 0 12 0"/></svg>
    <h2>LINE Bot</h2>
  </div>
  <div class="group-list" id="groupList"></div>
  <div class="sidebar-footer">
    <div class="user-info-bar">
      <div class="avatar" id="userAvatar">?</div>
      <div>
        <div class="name" id="userName">-</div>
        <div class="role-tag" id="userRole">-</div>
      </div>
    </div>
    <div class="admin-actions" id="adminActions" style="flex-wrap:wrap">
      <a href="/register" class="admin-btn green">➕ เพิ่มผู้ใช้</a>
      <a href="#" onclick="showUserManager();return false" class="admin-btn blue">👥 จัดการผู้ใช้</a>
      <a href="#" onclick="showWelcomeManager();return false" class="admin-btn orange" style="flex:0 0 100%">📢 ข้อความต้อนรับ</a>
    </div>
    <a href="/logout" class="logout-btn">ออกจากระบบ</a>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="topbarTitle">เลือกกลุ่ม</h1>
    <span id="topbarBadge"></span>
  </div>
  <div id="tabsBar" style="display:none" class="tabs-bar">
    <button class="tab-btn active" id="tabSettings" onclick="switchTab('settings')">⚙️ ตั้งค่า</button>
    <button class="tab-btn" id="tabMessages" onclick="switchTab('messages')">💬 ข้อความล่าสุด <span class="refresh-dot"></span></button>
    <button class="tab-btn" onclick="switchTab('images')">🖼️ รูปภาพ</button>
    <button class="tab-btn" onclick="switchTab('files')">📁 ไฟล์</button>
  </div>
  <div class="content" id="content">
    <div class="empty">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <p>เลือกกลุ่มจากแถบด้านซ้ายเพื่อดูรายละเอียด</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let groups = [];
let currentGroupId = null;
let currentTab = 'settings';
let msgRefreshTimer = null;
let me = { role: 'viewer', username: '' };

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2500);
}

async function loadMe() {
  const res = await fetch('/api/me');
  me = await res.json();
  const roleLabel = me.role === 'admin' ? '👑 Admin' : me.role === 'moderator' ? '🛡️ ผู้ดูแล' : '👁️ ผู้ใช้';
  document.getElementById('userName').textContent = me.username;
  document.getElementById('userRole').textContent = roleLabel;
  document.getElementById('userAvatar').textContent = me.username.charAt(0).toUpperCase();
  if (me.role === 'admin') {
    document.getElementById('adminActions').classList.add('show');
  }
  if (me.role === 'viewer') {
    document.getElementById('tabSettings').style.display = 'none';
    document.getElementById('tabMessages').style.display = 'none';
    currentTab = 'images';
  }
}

async function loadGroups() {
  const res = await fetch('/api/groups');
  groups = await res.json();
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('groupList');
  const pending  = groups.filter(g => g.status === 'pending');
  const approved = groups.filter(g => g.status === 'approved');
  const rejected = groups.filter(g => g.status === 'rejected');

  let html = '';
  if (pending.length) {
    html += `<div class="group-section-label">รออนุมัติ <span class="pending-count">${pending.length}</span></div>`;
    html += pending.map(g => groupItemHtml(g)).join('');
  }
  if (approved.length) {
    html += `<div class="group-section-label">กลุ่มที่อนุมัติแล้ว</div>`;
    html += approved.map(g => groupItemHtml(g)).join('');
  }
  if (rejected.length) {
    html += `<div class="group-section-label">ปฏิเสธแล้ว</div>`;
    html += rejected.map(g => groupItemHtml(g)).join('');
  }
  if (!groups.length) {
    html = '<div style="padding:16px;font-size:13px;color:#aaa">ยังไม่มีกลุ่ม<br>เพิ่ม bot เข้ากลุ่มก่อน</div>';
  }
  list.innerHTML = html;
}

function groupItemHtml(g) {
  const dotClass = g.status === 'pending' ? 'pending' : g.status === 'rejected' ? 'rejected' : g.enabled ? 'approved' : 'disabled';
  return `
    <div class="group-item ${g.group_id === currentGroupId ? 'active' : ''}"
         onclick="selectGroup('${g.group_id}')">
      <div class="dot ${dotClass}"></div>
      <div style="overflow:hidden;flex:1">
        <div class="group-name">${g.name}</div>
        <div class="group-id">${g.group_id}</div>
      </div>
    </div>`;
}

function switchTab(tab) {
  currentTab = tab;
  const tabMap = { settings: 0, messages: 1, images: 2, files: 3 };
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === tabMap[tab]);
  });
  ['settings', 'messages', 'images', 'files'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });

  if (tab === 'messages') {
    startMsgRefresh();
  } else {
    stopMsgRefresh();
  }
  if (tab === 'images') loadImages();
  if (tab === 'files') loadFiles();
}

function startMsgRefresh() {
  stopMsgRefresh();
  msgRefreshTimer = setInterval(() => {
    if (currentGroupId && currentTab === 'messages') refreshMessages();
  }, 10000);
}

function stopMsgRefresh() {
  if (msgRefreshTimer) { clearInterval(msgRefreshTimer); msgRefreshTimer = null; }
}

async function refreshMessages() {
  if (!currentGroupId) return;
  const res = await fetch(`/api/groups/${currentGroupId}/messages?limit=50`);
  const { messages, stats } = await res.json();
  const statMap = {};
  stats.forEach(s => statMap[s.type] = s.count);
  renderMessagesPanel(messages, statMap);
}

async function selectGroup(groupId) {
  currentGroupId = groupId;
  stopMsgRefresh();
  const g = groups.find(x => x.group_id === groupId);
  document.getElementById('topbarTitle').textContent = g.name;

  const statusLabel = { pending: 'รออนุมัติ', approved: 'อนุมัติแล้ว', rejected: 'ปฏิเสธ' };
  document.getElementById('topbarBadge').innerHTML =
    `<span class="status-badge ${g.status}">${statusLabel[g.status]}</span>`;

  renderSidebar();

  if (g.status === 'pending') {
    document.getElementById('tabsBar').style.display = 'none';
    renderPending(g);
    return;
  }

  const res = await fetch(`/api/groups/${groupId}/messages?limit=50`);
  const { messages, stats } = await res.json();
  const statMap = {};
  stats.forEach(s => statMap[s.type] = s.count);

  document.getElementById('tabsBar').style.display = 'flex';
  renderApproved(g, messages, statMap);

  // viewer เปิด images tab อัตโนมัติ
  switchTab(me.role === 'viewer' ? 'images' : currentTab);
}

function renderMsgListHtml(messages) {
  if (!messages.length) return '<div style="padding:20px;text-align:center;color:#aaa;font-size:14px">ยังไม่มีข้อความ</div>';
  return messages.map(m => `
    <div class="msg-item">
      <span class="msg-type ${m.type}">${m.type === 'text' ? 'ข้อความ' : m.type === 'image' ? 'รูป' : 'ไฟล์'}</span>
      <div>
        ${m.type === 'text' ? `<div class="msg-text">${escHtml(m.text || '')}</div>` : ''}
        ${m.type === 'image' ? `<a class="msg-file-link" href="/api/files?path=${encodeURIComponent(m.file_path||'')}" target="_blank">ดูรูป</a>` : ''}
        ${m.type === 'file' ? `<a class="msg-file-link" href="/api/files?path=${encodeURIComponent(m.file_path||'')}">${escHtml(m.file_name||'ไฟล์')}</a>` : ''}
        <div class="msg-meta">${new Date(Number(m.timestamp)).toLocaleString('th-TH')} · ${m.sender_id}</div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessagesPanel(messages, statMap) {
  const el = document.getElementById('msgList');
  if (el) el.innerHTML = renderMsgListHtml(messages);
  // update stat cards
  ['text','image','file'].forEach(t => {
    const card = document.querySelector(`.card .value[data-type="${t}"]`);
    if (card) card.textContent = statMap[t] || 0;
  });
}

async function approveGroup(groupId) {
  await fetch(`/api/groups/${groupId}/approve`, { method: 'POST' });
  groups.find(x => x.group_id === groupId).status = 'approved';
  showToast('อนุมัติกลุ่มแล้ว ✅', 'success');
  currentTab = 'settings';
  selectGroup(groupId);
}

async function rejectGroup(groupId) {
  await fetch(`/api/groups/${groupId}/reject`, { method: 'POST' });
  groups.find(x => x.group_id === groupId).status = 'rejected';
  showToast('ปฏิเสธกลุ่มแล้ว', 'error');
  selectGroup(groupId);
}

async function saveDownloadPassword() {
  const pw = document.getElementById('download_password').value.trim();
  await saveGroup({ download_password: pw });
  showToast(pw ? 'ตั้งรหัสผ่านแล้ว 🔒' : 'ลบรหัสผ่านแล้ว');
}

async function saveName() {
  const name = document.getElementById('groupName').value.trim();
  if (!name) return;
  await saveGroup({ name });
  groups.find(g => g.group_id === currentGroupId).name = name;
  document.getElementById('topbarTitle').textContent = name;
  renderSidebar();
  showToast('บันทึกชื่อแล้ว');
}

async function updateFeature(key, value) {
  await saveGroup({ [key]: value });
  groups.find(g => g.group_id === currentGroupId)[key] = value;
  renderSidebar();
  showToast('บันทึกการตั้งค่าแล้ว');
}

async function saveGroup(data) {
  const g = groups.find(x => x.group_id === currentGroupId);
  await fetch(`/api/groups/${currentGroupId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...g, ...data }),
  });
}

async function sendMsg() {
  const input = document.getElementById('sendInput');
  const text = input.value.trim();
  if (!text) return;
  const res = await fetch(`/api/groups/${currentGroupId}/send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  if (res.ok) {
    input.value = '';
    showToast('ส่งข้อความสำเร็จ');
    await refreshMessages();
  } else {
    const err = await res.json();
    showToast(err.error || 'ส่งไม่สำเร็จ', 'error');
  }
}

          <a href="/api/files?path=${encodeURIComponent(m.file_path||'')}" target="_blank">
            <img src="/api/files?path=${encodeURIComponent(m.file_path||'')}"
                 style="width:100%;height:140px;object-fit:cover;display:block"
                 onerror="this.style.display='none'">
          </a>
          <div style="padding:8px 10px">
            <div style="font-size:12px;color:#555;line-height:1.4">${escHtml(m.caption || '(ยังไม่มี caption)')}</div>
            <div style="font-size:11px;color:#aaa;margin-top:4px">${new Date(Number(m.timestamp)).toLocaleDateString('th-TH')}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function clearImgFilter() {
  document.getElementById('imgSearchInput').value = '';
  document.getElementById('imgFromDate').value = '';
  document.getElementById('imgToDate').value = '';
  loadImages();
}

function clearFileFilter() {
  document.getElementById('fileSearchInput').value = '';
  document.getElementById('fileFromDate').value = '';
  document.getElementById('fileToDate').value = '';
  loadFiles();
}

async function loadImages() {
  const grid = document.getElementById('imgGrid');
  if (!grid || !currentGroupId) return;
  grid.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px;grid-column:1/-1">กำลังโหลด...</div>';
  const q    = document.getElementById('imgSearchInput')?.value.trim() || '';
  const from = document.getElementById('imgFromDate')?.value || '';
  const to   = document.getElementById('imgToDate')?.value || '';
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  const res = await fetch(`/api/groups/${currentGroupId}/images?${params}`);
  const images = await res.json();
  if (!images.length) {
    grid.innerHTML = '<div style="text-align:center;color:#aaa;padding:60px;grid-column:1/-1">ยังไม่มีรูปภาพ</div>';
    return;
  }
  grid.innerHTML = images.map((m, i) => `
    <div class="img-thumb" onclick="openLightbox(${i})">
      <img src="/api/files?path=${encodeURIComponent(m.file_path||'')}"
           onerror="this.parentElement.style.display='none'">
      <div class="img-date">${new Date(Number(m.timestamp)).toLocaleDateString('th-TH')}</div>
    </div>
  `).join('');
  window._imgData = images;
}

function openLightbox(index) {
  const img = window._imgData[index];
  if (!img) return;
  const lb = document.getElementById('lightbox');
  document.getElementById('lbImg').src = `/api/files?path=${encodeURIComponent(img.file_path||'')}`;
  document.getElementById('lbCaption').textContent = img.caption || '';
  lb.classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

async function saveWelcome() {
  const text = document.getElementById('welcome_text').value;
  const image_url = document.getElementById('welcome_image_url').value.trim();
  await saveGroup({ welcome_text: text, welcome_image_url: image_url });
  showToast('บันทึกข้อความต้อนรับแล้ว');
}

async function showWelcomeManager() {

  document.getElementById('topbarTitle').textContent = 'ข้อความต้อนรับ';

        <p style="font-size:13px;color:#888;margin-top:4px">ข้อความที่บอทส่งเมื่อถูกเพิ่มเข้ากลุ่ม</p>
      </div>
      ${approved.length === 0 ? '<p style="color:#aaa;font-size:14px">ยังไม่มีกลุ่มที่อนุมัติ</p>' :
        approved.map(g => `
          <div style="background:white;border:1px solid #e8eaed;border-radius:12px;padding:16px 20px;margin-bottom:12px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <div>
                <span style="font-weight:600;font-size:15px">${escHtml(g.name)}</span>
                <span style="font-size:11px;color:#aaa;margin-left:8px">${g.group_id.slice(0,16)}...</span>
              </div>
              <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
                <span style="color:#888">เปิดใช้</span>
                <label class="toggle" style="margin:0">
                  <input type="checkbox" data-wgid="${g.group_id}" class="welcome-toggle" ${g.welcome_enabled ? 'checked' : ''}
                    onchange="toggleWelcome('${g.group_id}',this.checked)">
                  <span class="slider"></span>
                </label>
              </label>
            </div>
            <textarea data-wtext="${g.group_id}" rows="3"
              style="width:100%;border:1.5px solid #e8eaed;border-radius:8px;padding:8px 12px;font-size:13px;resize:vertical;outline:none;font-family:inherit;margin-bottom:8px"
              placeholder="ข้อความต้อนรับ...">${escHtml(g.welcome_text || '')}</textarea>
            <div style="display:flex;gap:8px;align-items:center">
              <input data-wimg="${g.group_id}" type="text" value="${escHtml(g.welcome_image_url || '')}"
                style="flex:1;border:1.5px solid #e8eaed;border-radius:8px;padding:6px 10px;font-size:13px;outline:none"
                placeholder="URL รูปภาพ (ไม่บังคับ)">
              <button onclick="saveWelcomeForGroup('${g.group_id}')"

            </div>
          </div>
        `).join('')
      }
    </div>
  `;
}

async function toggleWelcome(groupId, enabled) {
  await fetch(`/api/groups/${groupId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ...groups.find(x => x.group_id === groupId), welcome_enabled: enabled }),
  });
  showToast(enabled ? 'เปิดข้อความต้อนรับแล้ว' : 'ปิดข้อความต้อนรับแล้ว');
}

async function saveWelcomeForGroup(groupId) {
  const text = document.querySelector(`textarea[data-wtext="${groupId}"]`).value;
  const img  = document.querySelector(`input[data-wimg="${groupId}"]`).value.trim();
  const g = groups.find(x => x.group_id === groupId) || { group_id: groupId };
  await fetch(`/api/groups/${groupId}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ ...g, welcome_text: text, welcome_image_url: img }),
  });
  showToast(`บันทึกข้อความต้อนรับแล้ว`);
}

async function showUserManager() {
  currentGroupId = null;
  document.getElementById('topbarTitle').textContent = 'จัดการผู้ใช้';
  document.getElementById('topbarBadge').innerHTML = '';
  document.getElementById('tabsBar').style.display = 'none';
  document.getElementById('content').innerHTML = '<div style="padding:24px;color:#aaa">กำลังโหลด...</div>';
  renderSidebar();

  const [usersRes, groupsRes] = await Promise.all([fetch('/api/users'), fetch('/api/groups')]);
  const users = await usersRes.json();
  const allGroups = await groupsRes.json();
  const approvedGroups = allGroups.filter((g) => g.status === 'approved');

  const roleLabel = { admin: '👑 Admin', moderator: '🛡️ ผู้ดูแล', viewer: '👁️ ผู้ใช้' };
  const roleColor = { admin: '#e8f5e9', moderator: '#e3f2fd', viewer: '#fff8e1' };

  document.getElementById('content').innerHTML = `
    <div style="padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:18px">ผู้ใช้งานทั้งหมด (${users.length} คน)</h2>
        <a href="/register" style="padding:8px 16px;background:#06c755;color:white;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600">➕ เพิ่มผู้ใช้</a>
      </div>
      ${users.map((u) => `
        <div style="background:white;border:1px solid #e8eaed;border-radius:12px;padding:16px 20px;margin-bottom:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div>
              <span style="font-weight:600;font-size:15px">${u.username}</span>
              <span style="background:${roleColor[u.role]};padding:2px 10px;border-radius:12px;font-size:12px;margin-left:8px">${roleLabel[u.role]}</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <select onchange="changeRole(${u.id},this.value)" style="border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:12px">
                <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                <option value="moderator" ${u.role==='moderator'?'selected':''}>ผู้ดูแล</option>
                <option value="viewer" ${u.role==='viewer'?'selected':''}>ผู้ใช้</option>
              </select>
              <button onclick="deleteUser(${u.id},'${u.username}')" style="background:#fee2e2;color:#c62828;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px">ลบ</button>
            </div>
          </div>
          ${u.role !== 'admin' ? `
          <div style="font-size:12px;color:#888;margin-bottom:6px">ห้องที่เข้าถึงได้:</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${approvedGroups.map((g) => `
              <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;background:#f5f7fa;padding:4px 10px;border-radius:8px">
                <input type="checkbox" data-uid="${u.id}" data-gid="${g.group_id}"
                  ${u.group_ids.includes(g.group_id) ? 'checked' : ''}
                  onchange="updateUserGroups(${u.id})">
                ${g.name}
              </label>`).join('')}
          </div>` : '<div style="font-size:12px;color:#06c755">เข้าถึงได้ทุกห้อง</div>'}
        </div>`).join('')}
    </div>
  `;
}

async function changeRole(userId, role) {
  await fetch(`/api/users/${userId}/role`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ role }) });
  showToast('เปลี่ยนสิทธิ์แล้ว');
}

async function updateUserGroups(userId) {
  const checkboxes = document.querySelectorAll(`input[data-uid="${userId}"]`);
  const group_ids = Array.from(checkboxes).filter(c => c.checked).map(c => c.dataset.gid);
  await fetch(`/api/users/${userId}/groups`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ group_ids }) });
  showToast('อัปเดตห้องแล้ว');
}

async function deleteUser(userId, username) {
  if (!confirm(`ลบผู้ใช้ "${username}" ใช่หรือไม่?`)) return;
  await fetch(`/api/users/${userId}`, { method: 'DELETE' });
  showToast('ลบผู้ใช้แล้ว');
  showUserManager();
}

function getFileIcon(name) {
  if (!name) return '📄';
  const ext = name.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return '📕';
  if (['doc','docx'].includes(ext)) return '📘';
  if (['xls','xlsx','csv'].includes(ext)) return '📗';
  if (['ppt','pptx'].includes(ext)) return '📙';
  if (['zip','rar','7z','tar','gz'].includes(ext)) return '🗜️';
  if (['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
  if (['mp3','wav','m4a'].includes(ext)) return '🎵';
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
  return '📄';
}

function formatBytes(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function loadFiles() {
  const list = document.getElementById('fileList');
  if (!list || !currentGroupId) return;
  list.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px">กำลังโหลด...</div>';
  const q    = document.getElementById('fileSearchInput')?.value.trim() || '';
  const from = document.getElementById('fileFromDate')?.value || '';
  const to   = document.getElementById('fileToDate')?.value || '';
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (from) params.set('from', from);
  if (to) params.set('to', to);
  const res = await fetch(`/api/groups/${currentGroupId}/files?${params}`);
  const files = await res.json();
  if (!files.length) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;padding:60px">ยังไม่มีไฟล์</div>';
    return;
  }
  list.innerHTML = files.map(f => `
    <div class="file-item">
      <div class="file-icon">${getFileIcon(f.file_name)}</div>
      <div class="file-info">
        <div class="file-name" title="${escHtml(f.file_name || '')}">${escHtml(f.file_name || 'ไม่ทราบชื่อ')}</div>
        <div class="file-meta">${formatBytes(f.file_size)}${f.file_size ? ' · ' : ''}${new Date(Number(f.timestamp)).toLocaleString('th-TH')}</div>
      </div>
      <a class="file-dl" href="/dl/${f.message_id}" target="_blank">📥 ดาวน์โหลด</a>
    </div>
  `).join('');
}

loadMe();
loadGroups();
setInterval(loadGroups, 15000);
</script>
