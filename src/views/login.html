<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ไลน์ฮับ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06c755;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img { width: 140px; height: 140px; object-fit: contain; }
    h1 {
      text-align: center;
      font-size: 20px;
      color: #222;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #06c755; }
    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #05b04a; }
    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/public/logo.png" alt="ไลน์ฮับ">
    </div>

    <script>
      if (new URLSearchParams(location.search).get('error')) {
        document.write('<div class="error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>');
      }
    </script>

    <form method="POST" action="/login">
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" name="username" placeholder="admin" autofocus required>
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit">เข้าสู่ระบบ</button>
    </form>
  </div>
</body>
</html>
